server {
    listen 5173 default_server;
    listen [::]:5173 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SSE stream endpoint — must be declared before the generic /api/ block
    # so its more specific match wins. Buffering must be off (otherwise nginx
    # accumulates the chunked body until the buffer fills before flushing),
    # and the read timeout has to be longer than the API's heartbeat interval
    # so an idle connection isn't reaped between heartbeats.
    location = /api/v1/calls/stream {
        proxy_pass http://api:8080/api/v1/calls/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://api:8080/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
