server {
    listen 5173 default_server;
    listen [::]:5173 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use a variable so nginx defers DNS resolution to request time. Otherwise
    # nginx fails to start on Fly (where the `api` hostname doesn't exist) — in
    # prod the dashboard talks to the API directly via VITE_API_BASE_URL anyway.
    # 127.0.0.11 is Docker's embedded DNS resolver (used for the local compose
    # stack); on Fly the location blocks below are unused, so resolver target
    # doesn't matter.
    resolver 127.0.0.11 ipv6=off valid=30s;

    # SSE stream endpoint — must be declared before the generic /api/ block
    # so its more specific match wins. Buffering must be off (otherwise nginx
    # accumulates the chunked body until the buffer fills before flushing),
    # and the read timeout has to be longer than the API's heartbeat interval
    # so an idle connection isn't reaped between heartbeats.
    location = /api/v1/calls/stream {
        set $api_upstream "api:8080";
        proxy_pass http://$api_upstream/api/v1/calls/stream$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        set $api_upstream "api:8080";
        proxy_pass http://$api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        set $api_upstream "api:8080";
        proxy_pass http://$api_upstream/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
