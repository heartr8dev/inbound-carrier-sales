name: "Inbound Carrier Sales"
agent_name: "Riley"
description: "Inbound voice agent that vets carriers via FMCSA, matches loads, negotiates pricing (≤3 rounds), and mocks transfer to a sales rep on close."

# LLM + voice (from get_node_config_schema enum on the Inbound Voice Agent event)
model_id: "gpt-5.1-instant"             # Low-latency conversational GPT-5 family
voices:
  - id: "qpwlpzgt2xxw"                  # Jenna - Clear, Engaging and Warm [en-US, female]
    name: "Jenna - Clear, Engaging and Warm"
languages:
  - id: "en"
    name: "English"
multi_lingual: false

# Speech-to-text — REQUIRED for the agent to hear the carrier on a web call.
# An Inbound Voice Agent created without `transcriber` will speak (TTS works)
# but never react to what the caller says.
transcriber:
  id: "deepgram-nova-3-multi"
  name: "Deepgram Nova 3 Multilingual"
enable_denoised_stt: true
# Domain-specific terms the transcriber should be biased toward.
keyterms:
  - "MC number"
  - "MC"
  - "dry van"
  - "reefer"
  - "flatbed"
  - "step deck"
  - "power only"
  - "loadboard"
  - "rate confirmation"
  - "lane"
  - "Dallas"
  - "Atlanta"
  - "Chicago"
  - "Memphis"
  - "Nashville"
  - "Houston"
  - "Phoenix"
  - "Sacramento"
  - "Tampa"
  - "Acme Logistics"
  - "Riley"

# Behavior knobs
record: true
real_time_sentiment_classifier: true
enable_memory: false
max_call_duration: 600
max_silence_hold_duration: 8

# Acme Logistics branding
initial_message: "Hi, thanks for calling Acme Logistics carrier sales — this is Riley. What lane are you running today?"

# Webhook tool target (replaced by scripts/setup_happyrobot.py at provisioning time)
api_base_url: "https://inbound-carrier-sales-api.fly.dev"
api_key_secret_name: "API_KEY"

tools:
  - verify_carrier
  - search_loads
  - submit_offer
  - transfer_call

post_call:
  ai_extract: true
  webhook_log_endpoint: "/api/v1/calls/log"
