# fly.toml app configuration file generated for inbound-carrier-sales-api on 2026-05-13T07:17:28Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'inbound-carrier-sales-api'
primary_region = 'iad'

[build]
  dockerfile = 'api/Dockerfile'

[env]
  PORT = '8080'
  PYTHONPATH = '/app'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
