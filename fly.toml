# Fly.io configuration for the FastAPI service.
# Deployed by .github/workflows/deploy.yml.

app = "inbound-carrier-sales-api"
primary_region = "iad"

[build]
  dockerfile = "api/Dockerfile"

[env]
  PORT = "8080"
  PYTHONPATH = "/app"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine warm so deploy-step `flyctl ssh console` always has a target
  # for alembic migrations + seed. Cold-start latency on first call also matters
  # for the demo, so this is worth the small ongoing cost.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 80
    hard_limit = 100

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
  cpu_kind = "shared"
